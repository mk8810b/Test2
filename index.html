<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C231A">
<title>Bankroll</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230C231A'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23C9A24B'%3E♠%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --felt: #0C231A;
    --panel: #123026;
    --edge: #1D4636;
    --ivory: #F2EDDF;
    --ivory-dim: rgba(242,237,223,0.55);
    --gold: #C9A24B;
    --win: #5BB385;
    --loss: #D0604F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: radial-gradient(ellipse at 50% -10%, #16382B 0%, var(--felt) 60%);
    min-height: 100vh;
    color: var(--ivory);
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    padding: max(28px, env(safe-area-inset-top)) 18px 48px;
    max-width: 480px;
    margin: 0 auto;
  }
  .eyebrow {
    text-align: center; font-size: 11px; letter-spacing: 0.32em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 6px;
  }
  .total {
    text-align: center;
    font-family: Georgia, 'Hiragino Mincho ProN', serif;
    font-size: 44px; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .total .unit { font-size: 18px; margin-left: 4px; color: var(--ivory-dim); font-family: -apple-system, sans-serif; }
  .meta { text-align: center; font-size: 12px; color: var(--ivory-dim); margin-top: 8px; }
  .badge {
    display: block; width: fit-content; margin: 10px auto 0; padding: 4px 12px;
    border-radius: 99px; font-size: 11px; letter-spacing: 0.05em;
  }
  .badge.ok    { background: rgba(91,179,133,0.15); color: var(--win);  border: 1px solid rgba(91,179,133,0.3); }
  .badge.error { background: rgba(208,96,79,0.18);  color: var(--loss); border: 1px solid rgba(208,96,79,0.35); }
  .card {
    background: var(--panel); border: 1px solid var(--edge);
    border-radius: 14px; padding: 16px; margin-top: 18px;
  }
  .chart-card { padding: 14px 12px 8px; }
  .chart-label { font-size: 10px; letter-spacing: 0.18em; color: var(--ivory-dim); text-transform: uppercase; margin-bottom: 4px; }
  svg { width: 100%; height: auto; display: block; }
  .toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .toggle button {
    flex: 1; padding: 11px 0; border-radius: 10px; font-size: 15px; font-weight: 600;
    border: 1.5px solid transparent; background: rgba(242,237,223,0.06);
    color: var(--ivory-dim); cursor: pointer; transition: all .15s;
  }
  .toggle button.win-on  { border-color: var(--win);  background: rgba(91,179,133,0.13); color: var(--win); }
  .toggle button.loss-on { border-color: var(--loss); background: rgba(208,96,79,0.13);  color: var(--loss); }
  input {
    width: 100%; padding: 13px 14px; border-radius: 10px;
    border: 1px solid var(--edge); background: rgba(0,0,0,0.25);
    color: var(--ivory); font-size: 17px; margin-bottom: 10px; outline: none;
    font-variant-numeric: tabular-nums;
  }
  input[type="text"] { font-size: 14px; padding: 11px 14px; margin-bottom: 12px; }
  input::placeholder { color: rgba(242,237,223,0.35); }
  .submit {
    width: 100%; padding: 14px 0; border-radius: 10px; border: none;
    background: var(--gold); color: #1A1408;
    font-size: 16px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer;
  }
  .submit:disabled { background: rgba(201,162,75,0.25); color: rgba(26,20,8,0.5); }
  .empty { text-align: center; color: var(--ivory-dim); font-size: 14px; padding: 24px 0; }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 14px; margin-top: 8px;
    background: rgba(242,237,223,0.04); border-radius: 12px;
  }
  .row.w { border-left: 3px solid var(--win); }
  .row.l { border-left: 3px solid var(--loss); }
  .row .amt { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .row.w .amt { color: var(--win); }
  .row.l .amt { color: var(--loss); }
  .row .sub { font-size: 12px; color: var(--ivory-dim); margin-top: 2px; }
  .row .del {
    background: none; border: none; color: rgba(242,237,223,0.35);
    font-size: 18px; cursor: pointer; padding: 4px 8px;
  }
  .io { display: flex; gap: 8px; margin-top: 22px; }
  .io button {
    flex: 1; padding: 10px 0; border-radius: 10px; font-size: 12px;
    border: 1px solid var(--edge); background: transparent;
    color: var(--ivory-dim); cursor: pointer;
  }
</style>
</head>
<body>
  <div class="eyebrow">♠ Bankroll ♠</div>
  <div class="total" id="total"></div>
  <div class="meta" id="meta"></div>
  <div class="badge ok" id="badge" style="display:none"></div>

  <div class="card chart-card" id="chartCard" style="display:none">
    <div class="chart-label">累積推移</div>
    <svg id="chart" viewBox="0 0 320 84"></svg>
  </div>

  <div class="card">
    <div class="toggle">
      <button id="btnWin">勝ち</button>
      <button id="btnLoss">負け</button>
    </div>
    <input type="number" inputmode="numeric" id="amount" placeholder="金額（円）">
    <input type="text" id="note" placeholder="メモ（例: NL20 / 3h）">
    <button class="submit" id="submit" disabled>記録する</button>
  </div>

  <div id="list"></div>

  <div class="io">
    <button id="exportBtn">データを書き出す</button>
    <button id="importBtn">データを読み込む</button>
  </div>

<script>
const KEY = "poker-sessions-v1";
let sessions = [];
let isWin = true;

// ── storage ──
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) sessions = JSON.parse(raw);
  } catch (e) { showBadge("⚠ 読み込みに失敗", false); }
}
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(sessions));
    const check = localStorage.getItem(KEY);
    if (check === JSON.stringify(sessions)) {
      showBadge("✓ 保存済み", true);
    } else {
      showBadge("⚠ 保存に失敗", false);
    }
  } catch (e) { showBadge("⚠ 保存に失敗", false); }
}
function showBadge(text, ok) {
  const b = document.getElementById("badge");
  b.textContent = text;
  b.className = "badge " + (ok ? "ok" : "error");
  b.style.display = "block";
}

// ── render ──
function fmt(n) {
  const sign = n > 0 ? "+" : n < 0 ? "−" : "";
  return sign + Math.abs(n).toLocaleString("ja-JP");
}
function esc(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function render() {
  const total = sessions.reduce((a, s) => a + s.amount, 0);
  const wins = sessions.filter(s => s.amount > 0).length;
  const t = document.getElementById("total");
  t.innerHTML = fmt(total) + '<span class="unit">円</span>';
  t.style.color = total >= 0 ? "var(--ivory)" : "var(--loss)";
  document.getElementById("meta").textContent =
    sessions.length + "セッション ・ 勝率 " +
    (sessions.length ? Math.round(wins / sessions.length * 100) : 0) + "%";

  // chart
  const cumulative = [0];
  let acc = 0;
  for (const s of sessions) { acc += s.amount; cumulative.push(acc); }
  const cc = document.getElementById("chartCard");
  if (cumulative.length > 2) {
    cc.style.display = "block";
    drawChart(cumulative);
  } else {
    cc.style.display = "none";
  }

  // list
  const list = document.getElementById("list");
  if (sessions.length === 0) {
    list.innerHTML = '<div class="empty">まだ記録がない。最初のセッションを追加しよう。</div>';
    return;
  }
  list.innerHTML = [...sessions].reverse().map(s => `
    <div class="row ${s.amount >= 0 ? "w" : "l"}">
      <div>
        <div class="amt">${fmt(s.amount)}円</div>
        <div class="sub">${esc(s.date)}${s.note ? " ・ " + esc(s.note) : ""}</div>
      </div>
      <button class="del" data-id="${s.id}">×</button>
    </div>`).join("");
  list.querySelectorAll(".del").forEach(b => {
    b.onclick = () => {
      sessions = sessions.filter(s => s.id !== Number(b.dataset.id));
      save(); render();
    };
  });
}
function drawChart(points) {
  const w = 320, h = 84, pad = 6;
  const min = Math.min(0, ...points), max = Math.max(0, ...points);
  const range = max - min || 1;
  const x = i => pad + (i / (points.length - 1)) * (w - pad * 2);
  const y = v => h - pad - ((v - min) / range) * (h - pad * 2);
  const path = points.map((v, i) => (i === 0 ? "M" : "L") + x(i).toFixed(1) + "," + y(i).toFixed(1)).join(" ");
  const last = points[points.length - 1];
  const color = last >= 0 ? "var(--win)" : "var(--loss)";
  document.getElementById("chart").innerHTML =
    `<line x1="${pad}" x2="${w-pad}" y1="${y(0)}" y2="${y(0)}" stroke="rgba(242,237,223,0.18)" stroke-dasharray="3 4"/>` +
    `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` +
    `<circle cx="${x(points.length-1)}" cy="${y(last)}" r="3.5" fill="${color}"/>`;
}

// ── input handlers ──
const amountEl = document.getElementById("amount");
const noteEl = document.getElementById("note");
const submitEl = document.getElementById("submit");
const btnWin = document.getElementById("btnWin");
const btnLoss = document.getElementById("btnLoss");

function setMode(win) {
  isWin = win;
  btnWin.className = win ? "win-on" : "";
  btnLoss.className = win ? "" : "loss-on";
}
btnWin.onclick = () => setMode(true);
btnLoss.onclick = () => setMode(false);
amountEl.oninput = () => { submitEl.disabled = !parseInt(amountEl.value, 10); };
submitEl.onclick = () => {
  const v = parseInt(amountEl.value, 10);
  if (!v || v <= 0) return;
  sessions.push({
    id: Date.now(),
    amount: isWin ? v : -v,
    note: noteEl.value.trim(),
    date: new Date().toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }),
  });
  save();
  amountEl.value = ""; noteEl.value = "";
  submitEl.disabled = true;
  render();
};

// ── export / import（バックアップ保険）──
document.getElementById("exportBtn").onclick = async () => {
  const json = JSON.stringify(sessions);
  try {
    await navigator.clipboard.writeText(json);
    showBadge("✓ クリップボードにコピーした", true);
  } catch (e) {
    prompt("このテキストをコピーして保管:", json);
  }
};
document.getElementById("importBtn").onclick = () => {
  const raw = prompt("書き出したデータを貼り付け:");
  if (!raw) return;
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error();
    sessions = parsed;
    save(); render();
  } catch (e) { showBadge("⚠ データ形式が不正", false); }
};

// ── init ──
setMode(true);
load();
render();
</script>
</body>
</html>
